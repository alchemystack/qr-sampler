id: mock_uniform
name: "Mock Uniform"
description: |
  Configurable mock entropy source for testing and development.

  Generates pseudorandom bytes using numpy's random number generator. Supports
  seeded reproducibility (for deterministic tests) and configurable bias
  simulation (for testing whether the amplification pipeline correctly detects
  and propagates statistical shifts).

  This source is used extensively in the test suite:
    - Seeded mode: Produces identical byte sequences across runs, enabling
      deterministic assertions on token selection outcomes.
    - Bias mode: Shifts the mean of generated bytes away from 127.5 to verify
      that the z-score amplifier and ECDF amplifier correctly translate
      per-byte bias into a shifted u-value.

  Configuration:
    QR_ENTROPY_SOURCE_TYPE=mock_uniform

  Not intended for production use. For development and testing only.

source_class: "qr_sampler.entropy.mock:MockUniformSource"
transport: local

dependencies: []

compatible_amplifiers:
  - zscore_mean
  - ecdf

known_incompatible_amplifiers: []

defaults: {}
